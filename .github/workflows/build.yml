name: Check Asteroids

on:
  push:
    branches: [main]
  pull_request:

jobs:
  clang-format:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Install clang-format
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh
          CLANG_FORMAT=$(ls /usr/bin/clang-format-* | grep -E 'clang-format-[0-9]+$' | sort -V | tail -1)
          echo "CLANG_FORMAT=$CLANG_FORMAT" >> $GITHUB_ENV

      - name: Check formatting
        run: find -name "*.[ch]" -print0 | xargs -n1 -r -0 "$CLANG_FORMAT" --dry-run -Werror

  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - name: Install Clang (LLVM PPA)
        if: runner.os == 'Linux'
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh
          CLANG=$(ls /usr/bin/clang-* | grep -E 'clang-[0-9]+$' | sort -V | tail -1)
          echo "CC=$CLANG" >> $GITHUB_ENV

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt update
          sudo apt install -y ninja-build cmake \
            libasound2-dev libx11-dev libxrandr-dev libxi-dev \
            libgl1-mesa-dev libglu1-mesa-dev libxcursor-dev \
            libxinerama-dev libwayland-dev libxkbcommon-dev
          pip install meson
          git clone --depth 1 --branch 5.5 https://github.com/raysan5/raylib.git /tmp/raylib
          cmake -S /tmp/raylib -B /tmp/raylib/build -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=OFF
          sudo cmake --build /tmp/raylib/build --target install

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install meson raylib

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: CLANG64
          install: mingw-w64-clang-x86_64-clang mingw-w64-clang-x86_64-meson mingw-w64-clang-x86_64-raylib

      - name: Build
        if: runner.os != 'Windows'
        run: |
          meson setup build
          meson compile -C build

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          meson setup build
          meson compile -C build

  web:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup emsdk
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.64
          actions-cache-folder: emsdk-cache

      - name: Install meson + ninja
        run: |
          sudo apt update
          sudo apt install -y ninja-build cmake
          pip install meson

      - name: Cache raylib (web)
        id: cache-raylib-web
        uses: actions/cache@v4
        with:
          path: /tmp/raylib-web
          key: raylib-5.5-web-${{ hashFiles('.github/workflows/build.yml') }}

      - name: Build raylib for web (cache miss)
        if: steps.cache-raylib-web.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch 5.5 https://github.com/raysan5/raylib.git /tmp/raylib
          emcmake cmake -S /tmp/raylib -B /tmp/raylib/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DPLATFORM=Web \
            -DCMAKE_INSTALL_PREFIX=/tmp/raylib-web
          cmake --build /tmp/raylib/build --parallel
          cmake --install /tmp/raylib/build

      - name: Build asteroids (web)
        run: |
          export PKG_CONFIG_PATH=/tmp/raylib-web/lib/pkgconfig
          meson setup build-web --cross-file cross/emscripten.ini --buildtype release
          meson compile -C build-web

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: asteroids-web
          path: |
            build-web/asteroids.html
            build-web/asteroids.js
            build-web/asteroids.wasm
            build-web/asteroids.data
          if-no-files-found: ignore
