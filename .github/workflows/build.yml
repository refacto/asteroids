name: Build the game

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt update
          sudo apt install -y ninja-build pkg-config libraylib-dev
          pip install meson

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install meson ninja raylib

      - name: Build
        run: |
          meson setup build
          meson compile -C build
